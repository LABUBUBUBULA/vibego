name: VibeGo
options:
  bundleIdPrefix: com.vibego
  deploymentTarget:
    iOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: false
targets:
  VibeGo:
    type: application
    platform: iOS
    sources:
      - path: PlayTalk/App
        type: group
      - path: PlayTalk/Models
        type: group
      - path: PlayTalk/Common
        type: group
      - path: PlayTalk/Modules
        type: group
      - path: PlayTalk/Gateway
        type: group
      # 资源必须放进 sources 并指定 resources build phase；当前 XcodeGen 在虚拟机里忽略 target.resources。
      - path: PlayTalk/Resources
        type: group
        buildPhase: resources
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibegolive.app
        INFOPLIST_FILE: PlayTalk/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: PlayTalk/Resources/VibeGo.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: PlayTalk/Resources/VibeGo.entitlements
      properties:
        aps-environment: production
    capabilities:
      pushNotifications: true
