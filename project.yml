name: PlayTalk
options:
  bundleIdPrefix: com.playtalk
  deploymentTarget:
    iOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: false
targets:
  PlayTalk:
    type: application
    platform: iOS
    sources:
      - PlayTalk/App
      - PlayTalk/Models
      - PlayTalk/Common
      - PlayTalk/Modules
    resources:
      - PlayTalk/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playtalk.ios
        INFOPLIST_FILE: PlayTalk/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
