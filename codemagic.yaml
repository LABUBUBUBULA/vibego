workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      groups:
        - github_credentials
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate

      - name: Build for Simulator
        script: |
          cd $CM_BUILD_DIR
          xcodebuild -project PlayTalk.xcodeproj \
            -scheme PlayTalk \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run on Simulator
        script: |
          # 启动模拟器
          xcrun simctl boot "iPhone 17 Pro" || true
          open -a Simulator

          # 找到编译产物并安装到模拟器
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "PlayTalk.app" -path "*/Debug-iphonesimulator/*" | head -1)
          echo "App path: $APP_PATH"

          if [ -n "$APP_PATH" ]; then
            xcrun simctl install booted "$APP_PATH"
            xcrun simctl launch booted com.playtalk.ios
            echo "=== App launched on simulator ==="
          else
            echo "=== App not found ==="
          fi

          # 等待查看效果
          sleep 600

      - name: Push to GitHub
        script: |
          cd $CM_BUILD_DIR
          git config user.email "codemagic@playtalk.com"
          git config user.name "Codemagic CI"
          git remote set-url origin https://x-access-token:$GITHUB_TOKEN@github.com/agentdev-fan/PlayTalk.git
          git add -A
          git commit -m "Update from Codemagic" || echo "Nothing to commit"
          git push origin main
