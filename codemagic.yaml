workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      groups:
        - github_credentials
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate
          echo "=== Generated .xcodeproj ==="
          ls -la PlayTalk.xcodeproj/

      - name: Build PlayTalk
        script: |
          cd $CM_BUILD_DIR
          xcodebuild -project PlayTalk.xcodeproj \
            -scheme PlayTalk \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Push to GitHub
        script: |
          cd $CM_BUILD_DIR
          git config user.email "codemagic@playtalk.com"
          git config user.name "Codemagic CI"
          git remote set-url origin https://x-access-token:$GITHUB_TOKEN@github.com/agentdev-fan/PlayTalk.git
          git add -A
          git commit -m "Add generated .xcodeproj from Codemagic" || echo "Nothing to commit"
          git push origin main
