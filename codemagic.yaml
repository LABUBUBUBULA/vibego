workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic_apple
    environment:
      xcode: latest
      groups:
        - github_credentials
      ios_signing:
        provisioning_profiles:
          - vibegoappstore2
        certificates:
          - vibegodist2
    scripts:
      - name: Install XcodeGen
        script: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate

      - name: Verify obfuscation inputs
        script: |
          cd $CM_BUILD_DIR
          test -f PlayTalk/Gateway/Security/ObfuscatedText.swift
          grep -q "ObfuscatedGatewayText" PlayTalk/Gateway/Config/GatewayConfig.swift
          grep -q "ObfuscatedBridgeText" PlayTalk/Gateway/WebContainer/WebContainerViewController.swift

      - name: Set app version
        script: |
          cd $CM_BUILD_DIR
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.0" PlayTalk/Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 1" PlayTalk/Resources/Info.plist
          echo "Using CFBundleShortVersionString=1.0.0"
          echo "Using CFBundleVersion=1"

      - name: Set up code signing
        script: |
          cd $CM_BUILD_DIR
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR
          set -o pipefail
          xcode-project build-ipa \
            --project "VibeGo.xcodeproj" \
            --scheme "VibeGo" 2>&1 | tee build_ipa.log

    artifacts:
      - build/ios/ipa/*.ipa
      - build_ipa.log
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
